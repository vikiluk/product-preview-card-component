<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">
  
  <title>Frontend Mentor | Product preview card component</title>

</head>
<body>
  <main>
    <div class="card">
      <div class="product-image">
        <picture>
          <source media="(max-width: 600px)" srcset="./images/image-product-mobile.jpg">
          <img class="perfume" src="./images/image-product-desktop.jpg" alt="Perfume bottle">
        </picture>
      </div>
      
      <div class="product-info">
        <span class="product-category">Perfume</span>
        <h1 class="product-name">Gabrielle Essence Eau De&nbsp;Parfum</h1>
        <p class="product-description">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
      Perfumer-Creator for the House of CHANEL.</p>
        <div class="product-price">
          <span class="current-price">$149.99</span>
          <span class="original-price">$169.99</span>
        </div>
          <button class="add-to-cart" type="button">
            <img class="cart-icon" src="./images/icon-cart.svg" alt="">
            Add to Cart
          </button>
    </div>
  </main>
</body>
</html>
